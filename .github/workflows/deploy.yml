name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t sreerajesh03/my-image:latest .

      - name: Push Docker Image
        run: |
          docker push sreerajesh03/my-image:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull sreerajesh03/my-image:latest

            docker stop hapag || true
            docker rm hapag || true

            docker rmi sreerajesh03/my-image:latest || true

            docker pull sreerajesh03/my-image:latest

            docker run -d \
              --name hapag \
              --restart always \
              -p 80:80 \
              sreerajesh03/my-image:latest

            docker image prune -f