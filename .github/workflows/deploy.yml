name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/hotel-app

            git pull origin main

            sudo docker stop triway || true
            sudo docker rm triway || true

            sudo docker build -t ravi .

            sudo docker run -d --name triway -p 80:80 ravi